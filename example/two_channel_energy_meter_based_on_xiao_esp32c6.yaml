substitutions:
  pwd: ""

esphome:
  name: seeedstudio-2ch-em
  friendly_name: SeeedStudio-2CH-EM
  on_boot: 
    priority: 100
    then:
      - output.turn_on: gpio_14_output  # RF Switch Port Select
      - light.turn_off: Control_LED
      - delay: 10s
      - light.turn_off: Control_LED

output:
  - platform: gpio
    pin: GPIO14
    id: gpio_14_output

esp32:
  board: seeed_xiao_esp32c6
  variant: ESP32C6
  flash_size: 4MB    
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: y

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  output_power: 20dB
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "SeeedStudio-2CH-EM"
    password: ""

captive_portal:

web_server:
  port: 80

external_components:
  - source:
      type: local
      path: $pwd/components
    components: [ bl0939 ]

debug:

uart:
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 4800
  stop_bits: 2
  #rx_full_threshold: 48

sensor:
  - platform: bl0939
    mode: "current_transformer_mode"

    voltage:
      name: "BL0939 Voltage"
    current_1:
      name: "BL0939 Current 1"
    current_2:
      name: "BL0939 Current 2"
    active_power_1:
      name: "BL0939 Active Power 1"
    active_power_2:
      name: "BL0939 Active Power 2"
    energy_1:
      name: "BL0939 Energy 1"
    energy_2:
      name: "BL0939 Energy 2"
    energy_total:
      name: "BL0939 Energy Total"

    update_interval: 15s
    
  - platform: wifi_signal
    name: "Wi-Fi signal strength"
    update_interval: 10s

light:
  - platform: status_led
    id: Control_LED
    name: "PWR LED"
    pin:
      number:  GPIO19
      inverted: true

